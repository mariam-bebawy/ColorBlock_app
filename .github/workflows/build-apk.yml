name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Set JAVA_HOME to JDK 17
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Set up Android SDK (cmdline-tools + licenses)
        uses: android-actions/setup-android@v3

      - name: Install required SDK components (build-tools, platform, NDK r25b)
        run: |
          sdkmanager --install \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "ndk;25.1.8937393"
          yes | sdkmanager --licenses

      - name: Export SDK/NDK paths so buildozer skips its own download
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROIDSDK=$SDK" >> $GITHUB_ENV
          echo "ANDROIDNDK=$SDK/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "--- SDK structure ---"
          ls "$SDK/build-tools/" || true
          ls "$SDK/ndk/" || true

      - name: Cache buildozer build directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: colorblock-debug-apk
          path: bin/*.apk
          retention-days: 30
